<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crear cuenta · Jazmín</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=a378438d">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23B5D8E8'/%3E%3Ctext x='50' y='66' text-anchor='middle' font-family='Playfair Display, Georgia, serif' font-style='italic' font-size='56' font-weight='500' fill='%231F2A2E'%3EJ%3C/text%3E%3C/svg%3E">
</head>
<body>

<div data-vj-header></div>

<section class="auth-wrap">
  <aside class="auth-aside">
    <div>
      <span class="eyebrow" style="color:var(--blue-deep)" data-i18n="auth.signup">Crear cuenta</span>
      <h2 data-i18n="auth.aside.title">Tu jardín, a un clic.</h2>
      <p data-i18n="auth.aside.text">Crea una cuenta para guardar tus direcciones, pedidos y favoritos.</p>
    </div>
    <svg class="auth-bg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" fill="#2D4856">
      <g opacity=".2"><ellipse cx="200" cy="160" rx="100" ry="120"/><rect x="190" y="200" width="20" height="160"/></g>
    </svg>
  </aside>

  <div class="auth-form-wrap">
    <h1 data-i18n="auth.register.title">Crea tu cuenta</h1>
    <p class="auth-sub" data-i18n="auth.register.sub">Guarda tus pedidos y agiliza la compra la próxima vez.</p>

    <div class="auth-error" id="auth-error"></div>

    <button type="button" class="btn btn-light btn-block oauth-btn" id="google-signup">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A10.99 10.99 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.09a6.59 6.59 0 0 1 0-4.18V7.07H2.18a10.99 10.99 0 0 0 0 9.86l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
      <span data-i18n="auth.google.signup">Registrarse con Google</span>
    </button>
    <div class="oauth-divider"><span data-i18n="auth.or.email">o con tu correo</span></div>

    <form id="register-form">
      <div class="form-grid">
        <div class="form-field full">
          <label data-i18n="auth.name">Nombre completo</label>
          <input type="text" name="name" required autocomplete="name">
        </div>
        <div class="form-field">
          <label data-i18n="checkout.emailLbl">Correo electrónico</label>
          <input type="email" name="email" required autocomplete="email">
        </div>
        <div class="form-field">
          <label data-i18n="checkout.phoneLbl">Teléfono</label>
          <input type="tel" name="phone" autocomplete="tel">
        </div>
        <div class="form-field">
          <label data-i18n="auth.password">Contraseña</label>
          <div class="pw-wrap">
            <input type="password" name="password" id="pw-reg1" required minlength="6" autocomplete="new-password">
            <button type="button" class="pw-toggle" data-target="pw-reg1" aria-label="Mostrar contraseña">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-field">
          <label data-i18n="auth.password.confirm">Confirmar contraseña</label>
          <div class="pw-wrap">
            <input type="password" name="password2" id="pw-reg2" required minlength="6" autocomplete="new-password">
            <button type="button" class="pw-toggle" data-target="pw-reg2" aria-label="Mostrar contraseña">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-arrow mt-24" data-i18n="auth.signup">Crear cuenta</button>
    </form>

    <div class="auth-alt">
      <span data-i18n="auth.alt.tologin">¿Ya tienes cuenta?</span>
      <a href="entrar.html" data-i18n="auth.alt.tologin.cta">Entrar</a>
    </div>
  </div>
</section>

<div data-vj-footer></div>
<script src="js/data.js?v=5b13e2e5"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js?v=e654d638"></script>
<script src="js/app.js?v=7d5f2486"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("register-form");
    const err  = document.getElementById("auth-error");
    // Pre-fill email if it came from the post-purchase CTA (?email=foo@bar)
    const preEmail = new URLSearchParams(location.search).get("email");
    if (preEmail) {
      const emailInput = form.querySelector('input[name="email"]');
      if (emailInput) emailInput.value = preEmail;
    }
    function showErr(code) {
      const lang = localStorage.getItem("vj.lang") === "va" ? "va" : "es";
      err.textContent = (I18N[lang]["auth.err." + code]) || (I18N[lang]["auth.err.unknown"]);
      err.classList.add("is-show");
    }
    // When the project requires email confirmation, signUp succeeds but doesn't
    // log the user in yet — show a friendly "check your inbox" panel instead of
    // an error, and let them head to the login page once they've confirmed.
    function showConfirmSent(email) {
      const wrap = document.querySelector(".auth-form-wrap");
      if (!wrap) return;
      const stored = localStorage.getItem("vj.lang");
      const L = stored === "en" ? "en" : (stored === "va" ? "va" : "es");
      const T = {
        es: { h: "Revisa tu correo", p: `Te hemos enviado un enlace de confirmación a <strong>${email}</strong>. Ábrelo para activar tu cuenta; después podrás entrar con tu correo y contraseña.`, hint: "¿No lo ves? Mira en spam o promociones.", cta: "Ir a iniciar sesión" },
        va: { h: "Revisa el teu correu", p: `T'hem enviat un enllaç de confirmació a <strong>${email}</strong>. Obri'l per a activar el teu compte; després podràs entrar amb el teu correu i contrasenya.`, hint: "No el veus? Mira a spam o promocions.", cta: "Anar a iniciar sessió" },
        en: { h: "Check your email", p: `We've sent a confirmation link to <strong>${email}</strong>. Open it to activate your account; after that you can sign in with your email and password.`, hint: "Don't see it? Check spam or promotions.", cta: "Go to sign in" }
      }[L];
      wrap.innerHTML = `
        <div class="auth-confirm" style="text-align:center;">
          <div style="width:64px;height:64px;margin:0 auto 20px;border-radius:50%;background:var(--blue-3);display:flex;align-items:center;justify-content:center;color:var(--blue-ink);">
            <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7 10-7"/></svg>
          </div>
          <h1>${T.h}</h1>
          <p class="auth-sub">${T.p}</p>
          <p style="color:var(--ink-soft);font-size:.82rem;margin:0 0 24px;">${T.hint}</p>
          <a href="entrar.html" class="btn btn-primary btn-block btn-arrow">${T.cta}</a>
        </div>`;
    }
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.classList.remove("is-show");
      const fd = new FormData(form);
      if (fd.get("password") !== fd.get("password2")) {
        showErr("mismatch"); return;
      }
      try {
        await VJ_AUTH.register({
          name: fd.get("name"),
          email: fd.get("email"),
          phone: fd.get("phone"),
          password: fd.get("password")
        });
        const ret = new URLSearchParams(location.search).get("return");
        location.href = ret || "cuenta.html";
      } catch (e) {
        if ((e.message || "") === "confirm") { showConfirmSent(fd.get("email")); return; }
        showErr(e.message || "unknown");
      }
    });

    // Show / hide password
    document.querySelectorAll(".pw-toggle").forEach(btn => {
      btn.addEventListener("click", () => {
        const input = document.getElementById(btn.dataset.target);
        if (!input) return;
        input.type = input.type === "password" ? "text" : "password";
        btn.classList.toggle("is-show", input.type === "text");
      });
    });

    // Google OAuth sign-up
    const googleBtn = document.getElementById("google-signup");
    if (googleBtn) googleBtn.addEventListener("click", async () => {
      err.classList.remove("is-show");
      const supa = window.VJ_SUPA?.client;
      if (!supa) { showErr("unknown"); return; }
      const ret = new URLSearchParams(location.search).get("return");
      const { error } = await supa.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: location.origin + "/" + (ret || "cuenta.html")
        }
      });
      if (error) { err.textContent = error.message; err.classList.add("is-show"); }
    });
  });
</script>
</body>
</html>
